name: pixel_pomo
description: "Pixel-art Pomodoro timer — Flutter port (one codebase → Android APK + iOS IPA)."
publish_to: 'none'
version: 0.24.2+32

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  share_plus: ^10.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

# Launcher icon (the pixel tomato). Regenerated in CI after `flutter create`
# with: dart run flutter_launcher_icons  — so the logo survives scaffolding.
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#161616"
  adaptive_icon_foreground: "assets/icon/app_icon_fg.png"

flutter:
  uses-material-design: true
  assets:
    - assets/objects/
    - assets/icon/
  fonts:
    - family: PressStart2P
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
    # Galmuri11 (OFL, © Lee Minseo) — pixel font with full Hangul, used for Korean.
    - family: Galmuri11
      fonts:
        - asset: assets/fonts/Galmuri11.ttf
