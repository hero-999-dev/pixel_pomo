name: pixel_pomo
description: "Pixel-art Pomodoro timer — Flutter port (one codebase → Android APK + iOS IPA)."
publish_to: 'none'
version: 0.5.0+6

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  fonts:
    - family: PressStart2P
      fonts:
        - asset: assets/fonts/PressStart2P-Regular.ttf
