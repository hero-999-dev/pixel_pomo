name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Needed so the workflow can publish the APK to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk pixel_pomo-debug.apk

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel_pomo-debug-apk
          path: pixel_pomo-debug.apk
          if-no-files-found: error

      - name: Publish APK to the "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NOTES="Auto-built debug APK from commit ${GITHUB_SHA::7}. Tap the .apk asset below to install on your Android (allow installs from this source if prompted)."
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest pixel_pomo-debug.apk --clobber
            gh release edit latest --notes "$NOTES"
          else
            gh release create latest pixel_pomo-debug.apk \
              --title "Latest debug build" \
              --notes "$NOTES" \
              --prerelease
          fi
