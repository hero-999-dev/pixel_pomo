name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Needed so the workflow can publish the APK to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run unit tests (edge cases)
        run: |
          chmod +x ./gradlew
          ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: ignore

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # APK name follows the user's "0v0X_pixelpomo" scheme, derived from versionName:
      # 0.1.x -> 0v01_pixelpomo, 0.2.0 -> 0v02_pixelpomo, and so on for each release.
      - name: Compute APK name from versionName
        id: apkname
        run: |
          VN=$(grep -oE 'versionName = "[0-9]+\.[0-9]+\.[0-9]+"' app/build.gradle.kts | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')
          MINOR=$(echo "$VN" | cut -d. -f2)
          APK_NAME=$(printf "0v%02d_pixelpomo" "$MINOR")
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VN" >> "$GITHUB_OUTPUT"
          echo "Built $APK_NAME.apk (versionName $VN)"

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk "${{ steps.apkname.outputs.apk_name }}.apk"

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.apkname.outputs.apk_name }}
          path: ${{ steps.apkname.outputs.apk_name }}.apk
          if-no-files-found: error

      - name: Publish APK to the "latest" release
        env:
          GH_TOKEN: ${{ github.token }}
          APK: ${{ steps.apkname.outputs.apk_name }}.apk
          VERSION: ${{ steps.apkname.outputs.version }}
        run: |
          NOTES="Pixel Pomo v$VERSION — auto-built debug APK from commit ${GITHUB_SHA::7}. Tap the .apk asset below to install on your Android (allow installs from this source if prompted)."
          if gh release view latest >/dev/null 2>&1; then
            gh release upload latest "$APK" --clobber
            gh release edit latest --title "Latest debug build (v$VERSION)" --notes "$NOTES"
          else
            gh release create latest "$APK" \
              --title "Latest debug build (v$VERSION)" \
              --notes "$NOTES" \
              --prerelease
          fi
