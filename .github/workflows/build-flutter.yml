name: Build Flutter (iOS + Android)

# The Flutter port (in flutter/) builds one Dart codebase to BOTH platforms.
# To conserve CI minutes: routine pushes to main build ONLY the Android APK on a
# cheap ubuntu runner (1x minutes). The UNSIGNED iOS .ipa is built only on a manual
# run (GitHub → Actions → "Build Flutter (iOS + Android)" → Run workflow), because
# the macOS runner that iOS requires is billed at 10x. A manual run builds BOTH and
# refreshes the .ipa on the releases.

on:
  workflow_dispatch:        # manual run → Android + iOS on macOS (10x minutes)
  push:
    branches: [ main ]      # routine push → Android only on ubuntu (1x minutes)
    paths:
      - 'flutter/**'
      - '.github/workflows/build-flutter.yml'

permissions:
  contents: write

jobs:
  build:
    # Manual runs need macOS (to build iOS); routine pushes use cheap ubuntu.
    runs-on: ${{ github.event_name == 'workflow_dispatch' && 'macos-14' || 'ubuntu-latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Versions
        run: flutter --version

      # We only commit the portable parts (lib/, pubspec.yaml, assets/, test/). Generate the
      # ios/ + android/ scaffolding here, then restore our committed files (flutter create
      # overwrites pubspec.yaml / lib/main.dart with templates) and drop its widget test.
      - name: Scaffold platform projects
        working-directory: flutter
        run: |
          flutter create --org com.pixelpomo --project-name pixel_pomo --platforms=ios,android .
          git checkout -- pubspec.yaml lib
          rm -f test/widget_test.dart analysis_options.yaml

      - name: Pub get
        working-directory: flutter
        run: flutter pub get

      # flutter create stamps the default Flutter logo into android/ + ios/; this
      # bakes our pixel-tomato launcher icon back in so it survives scaffolding.
      - name: Generate launcher icons
        working-directory: flutter
        run: dart run flutter_launcher_icons

      # android/ is regenerated above, so our native live-wallpaper files live in
      # flutter/android_overlay/ and get copied in + the manifest patched here.
      - name: Apply Android native overlay (live wallpaper)
        working-directory: flutter
        run: python3 android_overlay/apply_overlay.py

      - name: Analyze (non-blocking)
        working-directory: flutter
        run: flutter analyze || true

      - name: Unit tests (gate)
        working-directory: flutter
        run: flutter test

      - name: Build Android APK
        working-directory: flutter
        run: flutter build apk --release

      # iOS only on a manual run — macOS runner is billed at 10x minutes.
      - name: Build iOS (unsigned)
        if: runner.os == 'macOS'
        working-directory: flutter
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        if: runner.os == 'macOS'
        working-directory: flutter/build/ios/iphoneos
        run: |
          mkdir -p Payload
          cp -R Runner.app Payload/Runner.app
          zip -qr9 pixel_pomo_ios.ipa Payload
          ls -la

      - name: Collect artifacts
        run: |
          cp flutter/build/app/outputs/flutter-apk/app-release.apk pixel_pomo_flutter.apk
          if [ "${{ runner.os }}" = "macOS" ]; then
            cp flutter/build/ios/iphoneos/pixel_pomo_ios.ipa pixel_pomo_ios.ipa
          fi
          ls -la pixel_pomo_flutter.apk

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: pixel_pomo_flutter
          path: |
            pixel_pomo_flutter.apk
            pixel_pomo_ios.ipa
          if-no-files-found: ignore

      - name: Publish releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Derive the version from pubspec: 0.21.0 -> VER=0.21.0, VTAG=v21 (the minor).
          VER=$(grep '^version:' flutter/pubspec.yaml | sed 's/version:[[:space:]]*//' | cut -d'+' -f1)
          VTAG="v$(echo "$VER" | cut -d. -f2)"
          # Upload whatever was built this run. --clobber only replaces same-named
          # assets, so a previous full build's .ipa stays on the release until the
          # next manual (macOS) run refreshes it.
          ASSETS="pixel_pomo_flutter.apk"
          if [ -f pixel_pomo_ios.ipa ]; then
            ASSETS="$ASSETS pixel_pomo_ios.ipa"
            TITLE="Flutter build (iOS + Android, v$VER)"
          else
            TITLE="Flutter build (Android, v$VER)"
          fi
          NOTES="Pixel Pomo — Flutter $VTAG ($VER) from ${GITHUB_SHA::7}. **Android:** install pixel_pomo_flutter.apk. **iOS:** pixel_pomo_ios.ipa is UNSIGNED — sideload with SideStore/AltStore. iOS is built only on a manual run (Actions -> Build Flutter -> Run workflow); routine pushes build Android only to save the 10x macOS minutes."

          for TAG in latest-flutter "flutter-$VTAG"; do
            if gh release view "$TAG" >/dev/null 2>&1; then
              gh release upload "$TAG" $ASSETS --clobber
              gh release edit "$TAG" --title "$TITLE" --notes "$NOTES"
            else
              gh release create "$TAG" $ASSETS --title "$TITLE" --notes "$NOTES" --prerelease
            fi
          done
